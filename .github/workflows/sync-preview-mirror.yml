name: Sync Preview Mirror

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Mirror upstream/next plus publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/solidjs/solid.git
          git fetch upstream next

          UPSTREAM_SHA=$(git rev-parse upstream/next)
          LAST_SYNCED=$(git rev-parse origin/next-mirror^ 2>/dev/null || echo none)
          if [ "$UPSTREAM_SHA" = "$LAST_SYNCED" ]; then
            echo "next-mirror already mirrors upstream ${UPSTREAM_SHA}"
            exit 0
          fi

          git checkout -B next-mirror "$UPSTREAM_SHA"
          git checkout "${{ github.sha }}" -- .github/workflows/preview-release.yml
          git add .github/workflows/preview-release.yml
          git commit -m "ci: preview release workflow (upstream ${UPSTREAM_SHA})"
          git push --force origin next-mirror

          # Pushes made with GITHUB_TOKEN never trigger push workflows,
          # so dispatch the publish run explicitly.
          gh workflow run preview-release.yml --repo "${{ github.repository }}" --ref next-mirror
