<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Frame News — Solid Server Components</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font: 15px/1.5 -apple-system, system-ui, sans-serif; color: #1a1a1a; }
      .layout { display: grid; grid-template-columns: 320px 1fr; min-height: 100vh; }
      nav { background: #f6f6ef; padding: 1rem; border-right: 1px solid #e0e0d8; }
      nav h2 { margin: 0 0 .75rem; color: #ff6600; }
      nav ul { list-style: none; margin: 0; padding: 0; }
      nav li { padding: .4rem .5rem; border-radius: 6px; }
      nav li.active { background: #ffe0c2; }
      nav a { cursor: pointer; font-weight: 600; }
      nav .meta { display: block; font-size: .8rem; color: #828282; }
      .collapse-all { display: block; margin-top: 1rem; font-size: .85rem; color: #555; }
      main { padding: 1.5rem 2rem; max-width: 720px; }
      main h1 { margin: 0 0 .25rem; }
      .meta { color: #828282; font-size: .85rem; }
      .comments { margin-top: 1rem; }
      .comment { margin: .5rem 0; padding-left: .75rem; border-left: 2px solid #e0e0d8; }
      .comment .toggle { border: none; background: none; color: #828282; cursor: pointer; padding: 0 .35rem 0 0; }
      .comment.collapsed > .body { display: none; }
      .replies { margin-left: .75rem; }
      .draft { margin-top: 1.5rem; }
      .draft input { width: 100%; padding: .5rem; border: 1px solid #ccc; border-radius: 6px; }
      .loading { color: #828282; font-style: italic; }
    </style>
  </head>
  <body>
    <script>/*__SC_BOOTSTRAP__*/</script>
    <div id="app"><!--app--></div>
    <script type="module" src="/dist/client.js"></script>
  </body>
</html>
